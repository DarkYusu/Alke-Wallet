<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">💳 Alke Wallet</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menú</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">Login</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">

        <h2 class="mb-4">Inicio de Sesión</h2>

        <div id="alertContainer"></div>

        <div class="form-card">

            <form id="loginForm">

                <div class="mb-3">
                    <label for="email" class="form-label">
                        Email
                    </label>

                    <input type="email" id="email" class="form-control" placeholder="Ingresa tu email" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        Contraseña
                    </label>

                    <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña"
                        required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Iniciar Sesión
                </button>

            </form>

        </div>

    </main>

    <footer class="text-center mt-5 mb-3">
        <p>&copy; 2026 Alke Wallet. Todos los derechos reservados.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/login.js"></script>

</body>

</html>
