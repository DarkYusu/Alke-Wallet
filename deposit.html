<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Depositar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

            <a class="navbar-brand" href="index.html">
                💳 Wallet
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">
                            Menú
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            Login
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <main class="container mt-5">

        <h2 class="mb-4">
            Depositar
        </h2>

        <div class="alert alert-info">
            <strong>Saldo actual:</strong>
            <span id="saldoActual">$60.000</span>
        </div>

        <div id="alert-container"></div>

        <form id="depositForm">

            <div class="mb-3">

                <label for="depositAmount" class="form-label">
                    Monto a depositar
                </label>

                <input type="number" class="form-control" id="depositAmount" placeholder="Ingresa el monto">

            </div>

            <button type="submit" class="btn btn-primary w-100">
                Realizar Depósito
            </button>

        </form>

        <p id="depositInfo" class="mt-3 fw-bold text-success">
        </p>

        <a href="menu.html" class="btn btn-secondary w-100 mt-2">
            Volver al Menú Principal
        </a>

    </main>

    <footer class="text-center mt-5 mb-3">
        <p>&copy; 2026 Wallet. Todos los derechos reservados.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        $(document).ready(function () {

            const usuarioActual = localStorage.getItem('usuarioActual');

            if (!usuarioActual) {

                window.location.href = 'login.html';
                return;

            }

            const claveSaldo = `saldo_${usuarioActual}`;

            let saldo = localStorage.getItem(claveSaldo);

            if (saldo === null) {

                saldo = 60000;

                localStorage.setItem(
                    claveSaldo,
                    saldo
                );

            }

            $('#saldoActual').text(
                '$' + Number(saldo).toLocaleString('es-CL')
            );

            $('#depositForm').submit(function (e) {

                e.preventDefault();

                let monto = Number(
                    $('#depositAmount').val()
                );

                if (monto <= 0 || isNaN(monto)) {

                    $('#alert-container').html(`
                <div class="alert alert-danger">
                    Debe ingresar un monto válido.
                </div>
            `);

                    return;

                }

                saldo = Number(saldo) + monto;

                localStorage.setItem(
                    claveSaldo,
                    saldo
                );

                $('#saldoActual').text(
                    '$' + Number(saldo).toLocaleString('es-CL')
                );

                $('#depositInfo').text(
                    'Monto depositado: $' +
                    monto.toLocaleString('es-CL')
                );

                $('#alert-container').html(`
            <div class="alert alert-success">
                Depósito realizado correctamente.
                Será redirigido al menú principal.
            </div>
        `);

                setTimeout(function () {

                    window.location.href =
                        'menu.html';

                }, 2000);

            });

        });

    </script>

</body>

</html>
