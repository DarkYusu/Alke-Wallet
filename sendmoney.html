<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Enviar Dinero</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

            <a class="navbar-brand" href="index.html">
                💳 Wallet
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">
                            Menú
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            Login
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <main class="container mt-5">

        <h2>Enviar Dinero</h2>

        <div class="alert alert-info">
            Saldo Disponible:
            <strong id="saldoActual"></strong>
        </div>

        <div class="mb-3">

            <label class="form-label">
                Buscar contacto
            </label>

            <input type="text" id="searchContact" class="form-control" placeholder="Buscar contacto...">

        </div>

        <a href="newcontact.html" class="btn btn-success w-100">
            + Agregar Nuevo Contacto
        </a>

        <h4 class="mt-4">
            Contactos
        </h4>

        <ul id="contactList" class="list-group">

            <li class="list-group-item contacto">
                John Doe
            </li>

            <li class="list-group-item contacto">
                Jane Smith
            </li>

        </ul>

        <div class="mt-3">

            <label class="form-label">
                Monto a enviar
            </label>

            <input type="number" id="montoEnviar" class="form-control" placeholder="Ingrese monto">

        </div>

        <button id="btnEnviarDinero" class="btn btn-primary w-100 mt-3" style="display:none;">

            Enviar Dinero

        </button>

        <div id="mensajeTransferencia" class="mt-3">
        </div>

        <a href="menu.html" class="btn btn-secondary w-100 mt-2">
            Volver al Menú Principal
        </a>

    </main>

    <footer class="text-center mt-5 mb-3">
        <p>&copy; 2026 Wallet. Todos los derechos reservados.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        $(document).ready(function () {

            localStorage.setItem(
                'saldo',
                saldo
            );

            $('#saldoActual').text(
                '$' + saldo.toLocaleString('es-CL')
            );

            let contactoSeleccionado = '';

            $('#searchContact').on('keyup', function () {

                let valor = $(this)
                    .val()
                    .toLowerCase();

                $('#contactList li').filter(function () {

                    $(this).toggle(
                        $(this)
                            .text()
                            .toLowerCase()
                            .indexOf(valor) > -1
                    );

                });

            });

            $('.contacto').click(function () {

                $('.contacto').removeClass(
                    'active'
                );

                $(this).addClass(
                    'active'
                );

                contactoSeleccionado =
                    $(this).text();

                $('#btnEnviarDinero').show();

            });

            $('#btnEnviarDinero').click(function () {

                let monto =
                    Number(
                        $('#montoEnviar').val()
                    );

                if (
                    monto <= 0 ||
                    isNaN(monto)
                ) {

                    $('#mensajeTransferencia').html(`
                        <div class="alert alert-danger">
                            Ingrese un monto válido.
                        </div>
                    `);

                    return;
                }

                if (monto > saldo) {

                    $('#mensajeTransferencia').html(`
                        <div class="alert alert-danger">
                            Saldo insuficiente.
                        </div>
                    `);

                    return;
                }

                saldo -= monto;

                localStorage.setItem(
                    'saldo',
                    saldo
                );

                $('#saldoActual').text(
                    '$' +
                    saldo.toLocaleString('es-CL')
                );

                $('#mensajeTransferencia').html(`
                    <div class="alert alert-success">
                        Transferencia enviada a
                        <strong>${contactoSeleccionado}</strong>
                        por
                        <strong>$${monto.toLocaleString('es-CL')}</strong>
                    </div>
                `);

            });

        });

    </script>

</body>

</html>
